name: Integration Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore tests/backend/FastBiteGroup.Integration.Tests/FastBiteGroup.Integration.Tests.csproj

      - name: Build integration tests
        run: dotnet build tests/backend/FastBiteGroup.Integration.Tests/FastBiteGroup.Integration.Tests.csproj -c Release --no-restore

      - name: Test integration
        run: dotnet test tests/backend/FastBiteGroup.Integration.Tests/FastBiteGroup.Integration.Tests.csproj -c Release --no-build --verbosity normal
