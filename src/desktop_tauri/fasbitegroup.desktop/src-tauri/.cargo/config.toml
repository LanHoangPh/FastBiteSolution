# Tối ưu hóa thời gian biên dịch Rust cho Windows (MSVC)
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# Tối ưu cho môi trường Dev: Giảm độ sâu của debug info để build nhanh hơn
[profile.dev]
debug = 1 # 1 = line tables only, giúp link nhanh hơn nhiều so với debug = 2 (full debug info)
